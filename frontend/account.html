<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account — Cruisewise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="nav">
    <a class="nav__brand" href="index.html">
      <svg width="32" height="20" viewBox="0 0 64 40" fill="none" stroke="var(--color-accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M2 28 Q4 34 12 35 L52 35 Q60 34 62 28 L56 24 L8 24 Z"/>
        <rect x="14" y="16" width="36" height="8" rx="1"/>
        <rect x="20" y="9" width="22" height="7" rx="1"/>
        <rect x="30" y="4" width="10" height="5" rx="1"/>
        <rect x="36" y="1" width="5" height="5" rx="1"/>
        <path d="M0 37 Q8 35 16 37 Q24 39 32 37 Q40 35 48 37 Q56 39 64 37" stroke-width="1.5" opacity="0.5"/>
      </svg>
      Cruisewise
    </a>
    <ul class="nav__links">
      <li><a class="nav__link" href="index.html">Home</a></li>
      <li><a class="nav__link" href="match.html">Match</a></li>
      <li><a class="nav__link" href="watch.html">Watch</a></li>
      <li><a class="nav__link nav__link--active" href="account.html">Account</a></li>
    </ul>
    <div id="auth-container"></div>
  </nav>

  <main>
    <section class="section">
      <div class="container container--form">
        <h1 class="section__title">Account</h1>
        <div id="account-content">
          <div class="account-card">
            <div class="account-row">
              <span class="account-label">Email</span>
              <span class="account-value" id="account-email">&mdash;</span>
            </div>
            <div class="account-row">
              <span class="account-label">Active watches</span>
              <span class="account-value" id="account-watches">&mdash;</span>
            </div>
            <div class="account-row">
              <span class="account-label">Matches run</span>
              <span class="account-value" id="account-matches">&mdash;</span>
            </div>
          </div>

          <div style="margin-top:16px;">
            <a href="watch.html" class="btn btn--text">View your watches &rarr;</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="js/account.js"></script>
  <div class="contact-attribution">Contact: Moe Shamim</div>

  <script type="module">
    import { auth, onAuthStateChanged } from "./js/auth.js";
    import { renderAuthButton } from "./js/auth-ui.js";
    const container = document.getElementById("auth-container");
    onAuthStateChanged(auth, () => renderAuthButton(container));
    renderAuthButton(container);
  </script>
</body>
</html>
